spring.application.name=cryptopal-core

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cryptopal}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cryptopal}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cryptopal}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.jpa.open-in-view=false

# Session
app.session.ttl-seconds=${SESSION_TTL_SECONDS:86400}  

# Market price scheduling
app.market.scheduling.enabled=${MARKET_SCHEDULING_ENABLED:true}
app.market.refresh-interval-ms=${MARKET_REFRESH_INTERVAL_MS:15000}
app.market.initial-delay-ms=${MARKET_INITIAL_DELAY_MS:1000}