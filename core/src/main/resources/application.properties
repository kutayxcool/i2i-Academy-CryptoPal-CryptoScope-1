spring.application.name=cryptopal-core

# Server (Render gibi platformlar PORT değişkenini otomatik atar)
server.port=${PORT:8080}

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cryptopal}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cryptopal}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cryptopal}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.jpa.open-in-view=false

# Session
app.session.ttl-seconds=${SESSION_TTL_SECONDS:86400}  

# Market price scheduling
app.market.scheduling.enabled=${MARKET_SCHEDULING_ENABLED:true}
app.market.refresh-interval-ms=${MARKET_REFRESH_INTERVAL_MS:15000}
app.market.initial-delay-ms=${MARKET_INITIAL_DELAY_MS:1000}

# CORS
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# Market price history scheduling
app.market.history.scheduling.enabled=${MARKET_HISTORY_SCHEDULING_ENABLED:true}
app.market.history.interval-ms=${MARKET_HISTORY_INTERVAL_MS:60000}
app.market.history.initial-delay-ms=${MARKET_HISTORY_INITIAL_DELAY_MS:5000}

# Gemini AI
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-3.5-flash}
app.ai.gemini.timeout-seconds=${GEMINI_TIMEOUT_SECONDS:15}

# OpenAPI and Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.cryptoscope.core
springdoc.paths-to-match=/api/**
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.docExpansion=none
springdoc.swagger-ui.persistAuthorization=true