version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: cryptopal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cryptopal
      POSTGRES_USER: cryptopal
      POSTGRES_PASSWORD: cryptopal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptopal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cryptopal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
